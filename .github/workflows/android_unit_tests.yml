name: Android UNIT Tests

on:
  push:
    paths-ignore:
      - 'README*'
  pull_request:
    paths-ignore:
      - 'README*'
  workflow_dispatch:

jobs:
  android_unit_test_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest
